<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dignity & Destiny Survey | Ikheloa's Foundation</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <link rel="stylesheet" href="assets/css/survey-style.css">
</head>
<body class="survey-page">

    <div class="glass-morph-bg"></div>

    <div class="survey-container" data-aos="zoom-in" data-aos-duration="800">
        <div class="progress-wrapper">
            <div class="progress-info">
                <span id="step-count">Step 1 of 10</span>
                <span id="percent-complete">10%</span>
            </div>
            <div class="progress-track">
                <div class="progress-fill" id="progress-bar"></div>
            </div>
        </div>

        <header class="survey-header">
            <div class="brand-badge">Ikheloa's Foundation</div>
            <h1>Dignity & Destiny Drive</h1>
            <p class="description">Hi sis 💞, help me pick the right pad brand for our JSS outreach. Your voice matters.</p>
        </header>

        <form id="padSurveyForm" class="multi-step-form">
            
            <div class="form-step active" data-step="1">
                <label class="main-label">What age range are you?</label>
                <div class="radio-grid">
                    <label class="modern-card">
                        <input type="radio" name="age_range" value="15-18">
                        <div class="card-content"><span>15–18</span></div>
                    </label>
                    <label class="modern-card">
                        <input type="radio" name="age_range" value="19-24">
                        <div class="card-content"><span>19–24</span></div>
                    </label>
                    <label class="modern-card">
                        <input type="radio" name="age_range" value="25-30">
                        <div class="card-content"><span>25–30</span></div>
                    </label>
                    <label class="modern-card">
                        <input type="radio" name="age_range" value="31+">
                        <div class="card-content"><span>31+</span></div>
                    </label>
                </div>
            </div>

            <div class="form-step" data-step="2">
                <label class="main-label">What brand of sanitary pad do you CURRENTLY use most?</label>
                <div class="input-wrapper">
                    <input type="text" name="current_brand" class="premium-input" placeholder="e.g. Molped, Always, Virony..." required>
                    <div class="input-focus-line"></div>
                </div>
            </div>

            <div class="form-step" data-step="3">
                <label class="main-label">Why do you use that brand? <small>(Pick all that apply)</small></label>
                <div class="checkbox-stack">
                    <label class="check-item"><input type="checkbox" name="reason" value="absorbent"> <span>Highly Absorbent / No Leaks</span></label>
                    <label class="check-item"><input type="checkbox" name="reason" value="comfortable"> <span>Comfortable / Soft on Skin</span></label>
                    <label class="check-item"><input type="checkbox" name="reason" value="affordable"> <span>Fits my Budget</span></label>
                    <label class="check-item"><input type="checkbox" name="reason" value="availability"> <span>Easy to find in my area</span></label>
                    <label class="check-item"><input type="checkbox" name="reason" value="skin-friendly"> <span>No rashes or itching</span></label>
                </div>
            </div>

            <div class="form-step" data-step="7">
                <label class="main-label">Which is more important to you?</label>
                <div class="slider-container">
                    <div class="slider-labels">
                        <span>Low Price</span>
                        <span>High Quality</span>
                    </div>
                    <input type="range" name="priority_scale" min="1" max="5" step="1" class="modern-range">
                    <div class="range-hint">1 = Price is everything | 5 = Quality is everything</div>
                </div>
            </div>

            <div class="survey-nav">
                <button type="button" class="btn-nav btn-prev" id="prevBtn" disabled>Back</button>
                <button type="button" class="btn-nav btn-next" id="nextBtn">Next Question</button>
                <button type="submit" class="btn-nav btn-submit" id="submitBtn" style="display:none;">Finish & Help a Girl</button>
            </div>
        </form>

        <footer class="survey-footer">
            <p>🔒 100% Anonymous & Secure</p>
        </footer>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="assets/js/survey.js"></script>
</body>
</html>
